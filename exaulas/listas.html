<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo listas</title>
</head>
<style>
    body{
        background-color: black;
        color: rgb(1, 73, 8);
    }
</style>
<body>

    <h1>Listas</h1>
    <h2>listas não ordenadas</h2>

    <ul>
        <li>Abacate</li>
        <li>Limão</li>
        <li>Laranja</li>
        <li>Mamão</li>
        <li>Maracujá</li>
      
    </ul>
    <h2>Listas ordenadas</h2>

    <ol>
         <li>batata</li>
        <li>alface</li>
        <li>tomate</li>
        <li>repolho</li>
        <li>brocolis</li>
      
    </ol>
    
</body>
</html>
