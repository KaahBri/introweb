<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aprendendo formulario</title>
  </head>
  <style>
    body {
      background-color: rgb(0, 0, 0);
      color: aliceblue;
    }
    h1:hover {
      color: rgb(0, 255, 8);
      
    }
    input {
      color: rgb(49, 99, 0);
      border-radius: 30px;
    }
  </style>
  <body>
    <h1>FORMULÁRIOS EM HTML</h1>

    <form method="post">
      <!--POST é fechado parda mais privada(viva a monogamia)-->
      <!--/-->
      <!--GET GERAL PODE VER E MEXER(basicamente um relacionamento aberto)-->
      <label for="nome">Nome:</label>

      <input
        type="text"
        name="nome"
        id="nome"
        placeholder="        Digite seu nome"
        required
      />

      <br />
      <br />

      <label for="senha">Senha:</label>

      <input
        type="password"
        name="senha"
        id="senha"
        placeholder="        Digite sua senha"
      />
    </form>
  </body>
</html>
