<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo tabelas</title>
</head>
<style>
    table{
        background-color: rgb(0, 0, 0);
        color: rgb(51, 255, 0);
       
    }
   
    
</style>
<body>

    <h1> Tabela em HTML</h1>
    <table border="10" >
        <thead>
          <tr><th>Produto</th> <th>Preço</th> <th>Categoria</th></tr>

        </thead>
        <tbody>
         <tr> <td>Fone </td> <td>R$ 250,00</td> <td>Eletrônico </td></tr>
         <tr> <td>Mouse </td> <td>R$ 180,00 </td> <td> TI</td></tr>
         <tr> <td>Teclado</td> <td>R$ 200,00  </td> <td>TI</td></tr>
        
         
         
          
        </tbody>
       
    </table>

    
</body>
</html>
